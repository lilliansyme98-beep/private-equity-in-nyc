<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE-Backed Restaurants in NYC</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #fff; }
  .map-container { max-width: 760px; margin: 0 auto; padding: 32px 20px 24px; }
  .map-hed {
    font-size: 1.15rem;
    font-weight: bold;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .map-dek {
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  #map { height: 500px; border: 1px solid #ddd; border-radius: 4px; }
  .legend {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 0.75rem;
    line-height: 1.8;
  }
  .legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .source {
    font-size: 0.72rem;
    color: #999;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="map-container">
  <div class="map-hed">197 PE-backed restaurant locations span all five boroughs</div>
  <div class="map-dek">Each dot is an NYC food establishment tied to a confirmed private equity deal. Color shows which firm is behind it.</div>
  <div id="map"></div>
  <div class="source">Sources: NYC Dept. of Health restaurant inspection data (May 2026); PE firm press releases. Analysis by Lillian Syme.</div>
</div>

<script>
const INVESTOR_COLORS = {
  "General Atlantic":           "#2563a8",
  "TriSpan":                    "#c0392b",
  "EHI":                        "#16a085",
  "L Catterton":                "#8e44ad",
  "RSE Ventures":               "#d35400",
  "Three Hills Capital Partners":"#27ae60",
  "Mohari":                     "#2c3e50",
};
const DEFAULT_COLOR = "#888";

const map = L.map('map').setView([40.73, -73.97], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = Object.entries(INVESTOR_COLORS).map(([name, color]) =>
    `<div><span class="legend-dot" style="background:${color}"></span>${name}</div>`
  ).join('');
  return div;
};
legend.addTo(map);

// Load geocoded data
Papa.parse('../Data/map_geocoded.csv', {
  download: true,
  header: true,
  complete: function(results) {
    results.data.forEach(row => {
      const lat = parseFloat(row.lat);
      const lon = parseFloat(row.lon);
      if (isNaN(lat) || isNaN(lon)) return;

      const color = INVESTOR_COLORS[row.investor] || DEFAULT_COLOR;

      const marker = L.circleMarker([lat, lon], {
        radius: 6,
        fillColor: color,
        color: '#fff',
        weight: 1,
        opacity: 1,
        fillOpacity: 0.85,
      });

      marker.bindPopup(`
        <strong>${row.name}</strong><br>
        ${row.restaurant_group}<br>
        <em style="color:#555">${row.investor}</em><br>
        <small>${row.deal_context}</small><br>
        <small style="color:#999">${row.address}</small>
      `);

      marker.addTo(map);
    });
  }
});
</script>
</body>
</html>
